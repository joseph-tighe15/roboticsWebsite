<html>
    <head>
        <title id="bot_name"></title>
        <link rel="stylesheet" href="src/bot.css">
    </head>
    <body>

        <p id="bot_name"></p>

        <img id="image"/>
        
        <p id="des"></p>

        <script>
            try {
            function getQueryParam(param) {
                const urlParams = new URLSearchParams(window.location.search);
                return urlParams.get(param);
            }
            fetch(`/${getQueryParam("bot")}.json`).then(response => response.json()).then(
                data => {
                    const name = data.name;
                    const descrition = data.descrition;
                    const imageUrl = data.image;
                    document.querySelector("#bot_name").innerHTML = name;
                    document.querySelector("#image").src = imageUrl;
                    document.querySelector("#des").innerHTML = descrition;

                }
            );
            } catch (e) {
                alert(e)
            }
            </script>
    </body>
    </html>
