<!doctype>
<html>
    <head>
        <style>
            .paralax {
                position: fixed;
                height: 100vh;
                width: 100vw;
                top: 0px;
                left: 0px;
            }
            .paralax img {
                width: 100%;
                height: 100%;
                z-index: -2;
            }
            .paralax h1 {
                text-align: center;
                width: 100%;
                height: 50%;
                z-index: -1;
            }
            .paralax-spacer {
                height:100vh;
            }
        </style>
    </head>
    <body>
        <div class="paralax">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxKJtW8FO4DElb1afDTwNJWrG8kzp8zXyuqQ&s">
            <h1>The Blender Bots</h1>
        </div>
        <div class="paralax-spacer"></div>
        <div class="content">
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
            <br>
        </div>
    </body>
</html>
